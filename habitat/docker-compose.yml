services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    command: python -m mk3_system.server --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace:ro
    environment:
      CODEX_MK3_ENV: local
      CODEX_MK3_RATE_LIMIT_PER_MINUTE: "120"

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    command: python -m mk3_system.diagnostics --json
    volumes:
      - ..:/workspace:ro
    depends_on:
      - api

  queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  metrics:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
