name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Run MK3 verification
        shell: pwsh
        run: ./scripts/verify_mk3.ps1

      - name: Run diagnostics
        shell: pwsh
        run: ./scripts/run_diagnostics.ps1

      - name: Run pre-deployment diagnostics
        shell: pwsh
        run: ./scripts/pre_deploy_diagnostics.ps1 -SkipApiHealth
