name: Promotion

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Promotion target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      run_stripe_checkout:
        description: "Run Stripe test checkout when test secrets are present"
        required: true
        default: false
        type: boolean

jobs:
  pre-deploy:
    runs-on: windows-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pre-deployment diagnostics
        shell: pwsh
        run: ./scripts/pre_deploy_diagnostics.ps1

      - name: Run Stripe test checkout
        if: ${{ inputs.run_stripe_checkout }}
        shell: pwsh
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_TEST_PRICE_ID: ${{ secrets.STRIPE_TEST_PRICE_ID }}
          STRIPE_SUCCESS_URL: ${{ vars.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ vars.STRIPE_CANCEL_URL }}
        run: ./scripts/stripe_checkout_test.ps1

      - name: Promote artifacts to stage
        if: ${{ inputs.target_environment == 'staging' }}
        shell: pwsh
        run: ./scripts/promote_to_stage.ps1

      - name: Run stage integration and load tests
        if: ${{ inputs.target_environment == 'staging' }}
        shell: pwsh
        run: ./scripts/stage_integration_load_tests.ps1

      - name: Upload stage artifacts
        if: ${{ inputs.target_environment == 'staging' }}
        uses: actions/upload-artifact@v4
        with:
          name: mk3-stage-promotion
          path: ops/stage/

  promote:
    runs-on: ubuntu-latest
    needs: pre-deploy
    environment: ${{ inputs.target_environment }}
    permissions:
      contents: read

    steps:
      - name: Promotion gate
        run: |
          echo "Pre-deployment checks passed for ${{ inputs.target_environment }}."
          echo "Deployment target binding is intentionally external to this repository."
